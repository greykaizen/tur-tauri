name: Build Snap
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Snap
      uses: snapcore/action-build@v1
      id: build
      with:
        path: .
        
    - name: Upload Snap Artifact
      uses: actions/upload-artifact@v4
      with:
        name: snap
        path: ${{ steps.build.outputs.snap }}
