name: tur-tauri
base: core24
version: '0.5.1'
license: GPL-3.0-or-later
summary: Tur — A sleek, multi-engine download manager
description: |
  Tur is a fast, multi-engine download manager featuring a modern UI powered by Tauri.
  This is the official native GUI frontend for the tur-rs Rust engine.
grade: stable
confinement: strict

apps:
  tur-tauri:
    command: usr/bin/tur
    common-id: io.github.greykaizen.tur
    desktop: usr/share/applications/io.github.greykaizen.tur.desktop
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - network
      - network-bind
      - home
      - removable-media
      - audio-playback

parts:
  tur-tauri:
    plugin: nil
    source: .
    build-packages:
      - build-essential
      - curl
      - pkg-config
      - rustc
      - cargo
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - libgtk-3-dev
      - librsvg2-dev
      - libssl-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
    override-build: |
      export RUSTUP_HOME="$CRAFT_PART_BUILD/.rustup"
      export CARGO_HOME="$CRAFT_PART_BUILD/.cargo"
      
      curl -fsSL https://nodejs.org/dist/v22.22.3/node-v22.22.3-linux-x64.tar.xz | tar -xJ
      export PATH="$CRAFT_PART_BUILD/node-v22.22.3-linux-x64/bin:$CARGO_HOME/bin:$PATH"

      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      
      export CI=true
      export NO_UPDATE_NOTIFIER=1
      
      npm install -g yarn
      yarn install --frozen-lockfile
      yarn web:build
      cargo build --release --locked --manifest-path src-tauri/Cargo.toml

      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/bin
      cp src-tauri/target/release/tur $SNAPCRAFT_PART_INSTALL/usr/bin/

      install -Dm644 src-tauri/icons/icon.png \
        $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/io.github.greykaizen.tur.png
      install -Dm644 packaging/flatpak/io.github.greykaizen.tur.desktop \
        $SNAPCRAFT_PART_INSTALL/usr/share/applications/io.github.greykaizen.tur.desktop
