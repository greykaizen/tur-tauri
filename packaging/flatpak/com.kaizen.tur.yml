app-id: com.kaizen.tur
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: tur-tauri
finish-args:
  # X11 + Wayland
  - --socket=fallback-x11
  - --socket=wayland
  # Network access for downloading
  - --share=network
  # GPU acceleration for webview
  - --device=dri
  # DBus for notifications and tray
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Downloads folder access
  - --filesystem=xdg-download
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/tur-tauri/cargo
    CARGO_NET_OFFLINE: 'true'
    npm_config_nodedir: /usr/lib/sdk/node20
modules:
  - name: tur-tauri
    buildsystem: simple
    build-commands:
      # Install JS dependencies (offline — requires generated node-sources.json)
      - npm ci --offline
      # Build frontend
      - node_modules/.bin/vite build || bunx vite build
      # Build Tauri/Rust binary
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      # Install binary
      - install -Dm755 src-tauri/target/release/tur-tauri /app/bin/tur-tauri
      # Install icons
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.kaizen.tur.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.kaizen.tur.png
      # Install desktop entry
      - install -Dm644 packaging/flatpak/com.kaizen.tur.desktop /app/share/applications/com.kaizen.tur.desktop
      # Install AppStream metainfo
      - install -Dm644 packaging/flatpak/com.kaizen.tur.metainfo.xml /app/share/metainfo/com.kaizen.tur.metainfo.xml
    sources:
      - type: git
        url: https://github.com/greykaizen/tur-tauri
        tag: v0.5.0
        commit: b4332647e75d662e0112db8ffd355d6a645598c4
      # Generated offline sources — run before submitting to Flathub:
      # flatpak-cargo-generator.py src-tauri/Cargo.lock -o cargo-sources.json
      # flatpak-node-generator npm package-lock.json -o node-sources.json
      # - node-sources.json
      # - cargo-sources.json
