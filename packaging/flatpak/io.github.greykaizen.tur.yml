app-id: io.github.greykaizen.tur
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: tur
finish-args:
  # X11 + Wayland
  - --socket=fallback-x11
  - --socket=wayland
  # Network access for downloading
  - --share=network
  # IPC access for WebKitGTK multi-process rendering (fixes invisible window & MIT-SHM crashes)
  - --share=ipc
  # GPU acceleration for webview
  - --device=dri
  # DBus for notifications and tray
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Downloads folder access
  - --filesystem=xdg-download
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/tur-tauri/cargo
    CARGO_NET_OFFLINE: 'true'
    npm_config_nodedir: /usr/lib/sdk/node20
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: tur-tauri
    buildsystem: simple
    build-commands:
      # Strip the Corepack packageManager field so it doesn't attempt to download bun offline
      - sed -i '/"packageManager":/d' package.json
      # Use a deterministic Yarn Classic offline mirror inside the sandbox.
      - printf 'yarn-offline-mirror "./flatpak-node/yarn-mirror"\nyarn-offline-mirror-pruning false\n' > .yarnrc
      # Install JS dependencies (offline — requires generated node-sources.json)
      - yarn install --offline --frozen-lockfile --non-interactive
      # Patch tauri.conf.json to use yarn instead of bun since we stripped bun
      - sed -i 's/"bun run/"yarn run/g' src-tauri/tauri.conf.json
      # Patch the Tray ID from "main" to the flatpak app ID so the system tray icon renders correctly
      - sed -i 's/TrayIconBuilder::with_id("main")/TrayIconBuilder::with_id("io.github.greykaizen.tur")/g' src-tauri/src/lib.rs
      - sed -i 's/tray_by_id("main")/tray_by_id("io.github.greykaizen.tur")/g' src-tauri/src/lib.rs
      # Build the Tauri app natively using the official CLI (embeds frontend assets properly)
      - node_modules/.bin/tauri build --no-bundle
      # Install binary
      - install -Dm755 src-tauri/target/release/tur-tauri /app/bin/tur
      # Install icons
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.greykaizen.tur.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.greykaizen.tur.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/io.github.greykaizen.tur.png
      # Install desktop entry
      - install -Dm644 packaging/shared/io.github.greykaizen.tur.desktop /app/share/applications/io.github.greykaizen.tur.desktop
      # Install AppStream metainfo
      - install -Dm644 packaging/shared/io.github.greykaizen.tur.metainfo.xml /app/share/metainfo/io.github.greykaizen.tur.metainfo.xml
    sources:
      - type: git
        url: https://github.com/greykaizen/tur-tauri
        tag: v0.5.0
        commit: 0a50039fb6c8a39b9fb1ab71a48e22fc1f9a14a3
      # Generated offline sources for local Flatpak builds.
      - node-sources.json
      - cargo-sources.json
      - type: file
        path: yarn.lock
